# =============================================================================
# install.conf — Configuration for automated Arch Linux install
# Target machine: Dell XPS 14 (2026), model DA14260
# Edit this file BEFORE booting the Archboot ISO. install.sh sources it.
#
# Design implemented by install.sh (see README.md "System design" for detail):
#   GPT: ESP (1 GiB, /efi) + LUKS2 (argon2id) > Btrfs subvolumes
#   Boot: mkinitcpio-built Unified Kernel Images (UKIs) in /efi/EFI/Linux,
#         launched by systemd-boot; kernel cmdline in /etc/kernel/cmdline
#   Secure Boot: sbctl custom keys + Microsoft vendor keys (post-install phase)
#   Unlock: TPM2 auto-unlock via systemd-cryptenroll, PCR 7 (post-install phase)
# =============================================================================

# --- Target disk (WILL BE COMPLETELY WIPED) ----------------------------------
# The XPS 14 DA14260 has a single NVMe SSD, normally /dev/nvme0n1.
# Verify with `lsblk` from the Archboot shell. Your Archboot USB stick will
# also appear (usually /dev/sda) — do not point this at the stick.
TARGET_DISK="/dev/nvme0n1"

# --- Identity -----------------------------------------------------------------
HOSTNAME="xps14"
USERNAME="jim"
# Leave passwords empty to be prompted interactively (recommended).
# If you preseed them here, remember this file sits in plaintext on the USB.
ROOT_PASSWORD=""
USER_PASSWORD=""

# --- Localization -------------------------------------------------------------
TIMEZONE="America/New_York"
LOCALE="en_US.UTF-8"
KEYMAP="us"

# --- Partition sizes ------------------------------------------------------------
# ESP size in MiB. 1024 leaves room for several UKIs (each ~50-150 MiB with
# the fallback image) plus systemd-boot and future firmware capsules.
ESP_SIZE_MIB=1024

# --- Encryption ---------------------------------------------------------------
# "yes" (default) = LUKS2 on the root partition: argon2id PBKDF, AES-XTS,
# passphrase in keyslot 0. TPM2 auto-unlock is added AFTER Secure Boot is
# enabled, by running secureboot-tpm2.sh on the installed system.
# "no" = unencrypted root (TPM2/secure-unlock scripts then don't apply).
ENCRYPT="yes"

# Pass "discard" to the LUKS layer so fstrim reaches the SSD. Slight metadata
# leak (which blocks are unused); standard trade-off on personal machines.
LUKS_ALLOW_DISCARDS="yes"

# --- Filesystem ---------------------------------------------------------------
# "btrfs" (default) creates subvolumes @ (/), @home, @log, @pkg, @snapshots
# with zstd:1 compression. "ext4" = single plain filesystem, no subvolumes.
ROOT_FS="btrfs"

# --- Swap ---------------------------------------------------------------------
# "zram" (default, compressed RAM swap; no hibernation)
# "partition" (SWAP_SIZE_GIB disk partition INSIDE nothing — note: a plain swap
#              partition is NOT encrypted; prefer zram on this encrypted setup)
# "none"
SWAP_MODE="zram"
SWAP_SIZE_GIB=32

# --- Secure Boot --------------------------------------------------------------
# Used by secureboot-tpm2.sh (run after first boot, not during install).
# "yes" (strongly recommended): enroll Microsoft vendor certificates alongside
# your own sbctl keys. Without them, option ROMs (Thunderbolt, GPU) that are
# signed only by Microsoft can fail to load — on some machines this soft-bricks
# the firmware. Only say "no" if you know your firmware doesn't need them.
SB_ENROLL_MICROSOFT="yes"

# TPM2 PCRs to bind the LUKS unlock to. "7" = Secure Boot state (recommended
# default: survives kernel/BIOS updates as long as SB config is unchanged).
# Stricter, e.g. "0+7", binds to firmware measurements too but requires
# re-enrolling after every BIOS update.
TPM2_PCRS="7"

# "yes" = require a PIN in addition to the TPM2 unseal at every boot
# (systemd-cryptenroll --tpm2-with-pin). The PIN is rate-limited by the TPM's
# anti-hammering (dictionary-attack lockout), so it can be much shorter than
# the LUKS passphrase while still blocking the "stolen laptop auto-unlocks to
# the login screen" scenario. You choose the PIN during phase 2.
TPM2_WITH_PIN="yes"

# --- Snapshots (Btrfs + snapper) ------------------------------------------------
# "yes" installs snapper + snap-pac and configures logarithmic timeline
# retention on the root subvolume: many recent snapshots, geometrically fewer
# older ones (see SNAP_* below). snap-pac additionally snapshots before/after
# every pacman transaction. Only applies when ROOT_FS="btrfs".
SNAPPER="yes"
SNAP_HOURLY=12     # keep last 12 hourly
SNAP_DAILY=7       # ... 7 daily
SNAP_WEEKLY=4      # ... 4 weekly
SNAP_MONTHLY=6     # ... 6 monthly
SNAP_YEARLY=1      # ... 1 yearly
SNAP_PACMAN=30     # cap on snap-pac pre/post pairs ("number" cleanup)

# --- Hardening baseline ---------------------------------------------------------
# "yes" additionally installs and enables:
#   * nftables firewall — default-deny inbound, allow established/lo/ICMP
#   * AppArmor LSM (+ lsm= kernel parameter) with default profiles
#   * /etc/sysctl.d/99-hardening.conf — kptr/dmesg restriction, ptrace scope,
#     unprivileged BPF off, kexec off, redirect/rp_filter network hygiene
# All chosen to stay out of a developer's way; see README "Hardening".
HARDENING="yes"

# --- Desktop environment ------------------------------------------------------
# "gnome", "kde", or "none"
DESKTOP="gnome"

# --- Extra packages (space-separated, appended to the base set) ---------------
EXTRA_PACKAGES="git htop man-db man-pages"

# --- Extra kernel command-line parameters --------------------------------------
# Appended verbatim to /etc/kernel/cmdline (baked into the UKIs). Use this if
# the live environment needed a graphics workaround, e.g.:
#   EXTRA_CMDLINE="xe.force_probe=*"        # preferred: enables the Xe driver
#   EXTRA_CMDLINE="nomodeset"               # last resort: no KMS, no Wayland
# Remove the workaround later by editing /etc/kernel/cmdline on the installed
# system and running:  mkinitcpio -P   (sbctl re-signs automatically)
EXTRA_CMDLINE=""

# --- Mirror (used only if the live environment has no mirrorlist) -------------
FALLBACK_MIRROR="https://geo.mirror.pkgbuild.com/\$repo/os/\$arch"
